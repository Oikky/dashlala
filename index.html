<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dash Lala</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{--bg:#0a0d14;--bg2:#0f1320;--card:rgba(255,255,255,.045);--cardLine:rgba(255,255,255,.09);
    --txt:#e9ecf4;--muted:#8a93ab;--accent:#7c6cff;--accent2:#22d3ee;--green:#34d399;--red:#fb7185;--amber:#fbbf24;--shadow:0 10px 30px rgba(0,0,0,.35);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;color:var(--txt);font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:84px;
    background:radial-gradient(1100px 600px at 85% -10%,rgba(124,108,255,.16),transparent 60%),radial-gradient(900px 600px at -10% 0%,rgba(34,211,238,.10),transparent 55%),linear-gradient(180deg,var(--bg2),var(--bg));background-attachment:fixed;min-height:100vh}
  header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;backdrop-filter:blur(10px);background:linear-gradient(180deg,rgba(10,13,20,.85),rgba(10,13,20,.35));border-bottom:1px solid var(--cardLine)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 14px var(--accent)}
  .month{font-size:12px;color:var(--muted);text-transform:capitalize;padding:5px 11px;border:1px solid var(--cardLine);border-radius:99px}
  .wrap{max-width:1500px;margin:0 auto;padding:18px 26px}
  @media(max-width:600px){.wrap{padding:16px}}
  h2{font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin:24px 4px 12px;display:flex;align-items:center;gap:8px}
  h2::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .card{background:var(--card);border:1px solid var(--cardLine);border-radius:18px;padding:16px;backdrop-filter:blur(8px);box-shadow:var(--shadow);animation:up .5s both;position:relative;overflow:hidden}
  .card .lbl{color:var(--muted);font-size:12.5px;display:flex;align-items:center;gap:6px}
  .card .val{font-size:22px;font-weight:800;margin-top:6px}
  .val.green{color:var(--green)}.val.red{color:var(--red)}.val.accent{color:#b9b3ff}
  .clk{cursor:pointer;transition:transform .12s,border-color .2s}.clk:hover{transform:translateY(-2px);border-color:var(--accent)}
  .clk.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,108,255,.35),var(--shadow)}
  .hero{background:linear-gradient(135deg,rgba(124,108,255,.18),rgba(34,211,238,.10));border:1px solid var(--cardLine);border-radius:22px;padding:22px 24px;box-shadow:var(--shadow);animation:up .5s both}
  .hero .lbl{color:var(--muted);font-size:13px;letter-spacing:1px;text-transform:uppercase}
  .hero .v{font-size:42px;font-weight:900;margin-top:4px}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .panel{background:var(--card);border:1px solid var(--cardLine);border-radius:18px;padding:16px;box-shadow:var(--shadow);animation:up .5s both}
  .panel h3{margin:0 0 10px;font-size:13px;color:var(--muted);font-weight:600}
  .ph{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  input,select,button,textarea{font:inherit}
  input,select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--cardLine);color:var(--txt);border-radius:12px;padding:12px;margin-top:6px;outline:none}
  select option{background:#12151b;color:var(--txt)}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,108,255,.18)}
  label{display:block;font-size:13px;color:var(--muted);margin-top:12px}
  button{background:linear-gradient(135deg,var(--accent),#5b8cff);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;cursor:pointer;margin-top:16px;width:100%;transition:transform .1s,filter .2s;box-shadow:0 8px 20px rgba(124,108,255,.3)}
  button:active{transform:scale(.98)}button:hover{filter:brightness(1.08)}
  button.ghost{background:rgba(255,255,255,.05);border:1px solid var(--cardLine);box-shadow:none;color:var(--txt)}
  button.green{background:linear-gradient(135deg,#34d399,#10b981);box-shadow:0 8px 20px rgba(52,211,153,.25)}
  button.amber{background:linear-gradient(135deg,#fbbf24,#f59e0b);box-shadow:none;color:#1a1505}
  button.sm{width:auto;padding:8px 14px;margin-top:0;font-size:13px}
  .row{display:flex;gap:12px}.row>*{flex:1}
  .seg{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 16px}
  .seg button{width:auto;margin:0;padding:8px 14px;border-radius:99px;background:rgba(255,255,255,.05);border:1px solid var(--cardLine);color:var(--muted);font-weight:600;font-size:13px;box-shadow:none}
  .seg button.on{background:linear-gradient(135deg,var(--accent),#5b8cff);color:#fff;border-color:transparent}
  .seg.mini button{padding:6px 11px;font-size:12px}
  .item{background:var(--card);border:1px solid var(--cardLine);border-radius:14px;padding:13px 15px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:10px;animation:up .4s both}
  .item small{color:var(--muted);font-size:12px}
  .pill{font-size:11px;padding:3px 10px;border-radius:99px;background:rgba(124,108,255,.16);color:#c3bcff;border:1px solid rgba(124,108,255,.25)}
  .bar{height:7px;border-radius:99px;background:rgba(255,255,255,.08);margin-top:7px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px}
  .bar>i.hot{background:linear-gradient(90deg,#fbbf24,#fb7185)}
  nav{position:fixed;bottom:0;left:0;right:0;z-index:6;display:flex;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom));backdrop-filter:blur(14px);background:linear-gradient(180deg,rgba(14,18,28,.6),rgba(8,10,16,.92));border-top:1px solid var(--cardLine)}
  nav button{flex:1;background:none;border:none;color:var(--muted);box-shadow:none;margin:0;padding:7px 2px;font-size:10px;font-weight:600;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  nav button.active{color:#fff;background:linear-gradient(135deg,rgba(124,108,255,.22),rgba(34,211,238,.14))}
  .muted{color:var(--muted);font-size:13.5px;line-height:1.5}
  .err{color:var(--red);font-size:13px;margin-top:10px}.ok{color:var(--green);font-size:13px;margin-top:10px}
  .skel{height:90px;border-radius:18px;background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.09),rgba(255,255,255,.04));background-size:200% 100%;animation:sh 1.2s infinite;margin-bottom:12px}
  @keyframes sh{from{background-position:200% 0}to{background-position:-200% 0}}
  .modal{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto}
  .modal .panel{max-width:460px;width:100%}
  .cc{border:1px solid var(--cardLine);border-radius:16px;overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
  .cc-band{height:60px;padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;color:#fff;font-weight:800;font-size:15px}
  .cc-chip{width:30px;height:22px;border-radius:5px;background:linear-gradient(135deg,#ffe08a,#c9a227)}
  .cc-body{padding:12px 14px}
  .delx{background:none;border:none;color:var(--muted);box-shadow:none;width:auto;margin:0;padding:2px 6px;font-size:15px;cursor:pointer}
  .delx:hover{color:var(--red)}
</style>
</head>
<body>
<header><div class="brand"><span class="dot"></span><span id="brandtxt">Dash Lala</span></div><span class="month" id="monthLabel"></span></header>
<div class="wrap" id="app"></div>
<div id="modal"></div>
<nav id="nav"></nav>
<script>
const DEFAULT_URL='https://dash-lala-api.ikkysousa5.workers.dev';
const LS={get url(){return localStorage.getItem('dl_url')||DEFAULT_URL},set url(v){localStorage.setItem('dl_url',v)},
  get token(){return localStorage.getItem('dl_token')||''},set token(v){v?localStorage.setItem('dl_token',v):localStorage.removeItem('dl_token')},
  get user(){return localStorage.getItem('dl_user')||''},set user(v){v?localStorage.setItem('dl_user',v):localStorage.removeItem('dl_user')},
  get vh(){return parseFloat(localStorage.getItem('dl_vh')||'0')||0},set vh(v){localStorage.setItem('dl_vh',v)}};
const BRL=n=>(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const app=document.getElementById('app');
let charts=[];
async function api(method,path,body){
  if(!LS.token)throw new Error('Faça login.');
  const r=await fetch(LS.url.replace(/\/$/,'')+path,{method,headers:{'Authorization':'Bearer '+LS.token,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  if(r.status===401){LS.token='';showLogin();throw new Error('Sessão expirada — entre de novo.');}
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.error||('Erro '+r.status));
  return data;
}
const list=name=>api('GET',`/tables/${encodeURIComponent(name)}/rows`).then(d=>d.rows||[]);
const addRow=(name,f)=>api('POST',`/tables/${encodeURIComponent(name)}/rows`,{rows:[f]});
const delRow=(name,id)=>api('DELETE',`/tables/${encodeURIComponent(name)}/rows/${encodeURIComponent(id)}`);
const CCOL=['linear-gradient(135deg,#7c6cff,#5b8cff)','linear-gradient(135deg,#fb7185,#f59e0b)','linear-gradient(135deg,#34d399,#22d3ee)','linear-gradient(135deg,#a78bfa,#f472b6)','linear-gradient(135deg,#22d3ee,#3b82f6)'];
function formaPg(){const f=document.getElementById('forma'),al=document.getElementById('formaalvo'),v=f?f.value:'',alvo=al?al.value:'';return {'Conta':v==='conta'?alvo:'','Cartão':v==='cartao'?alvo:''};}
function wireForma(sel,contas,carts){const alvo=document.getElementById('formaalvo');if(!alvo)return;sel.onchange=()=>{const v=sel.value,arr=v==='conta'?contas:v==='cartao'?carts:[];alvo.innerHTML='<option value="">'+(arr.length?'— selecione —':'(cadastre em Gerir)')+'</option>'+arr.map(x=>`<option>${x['Nome']}</option>`).join('');};}
function clearRange(){const a=document.getElementById('rde'),b=document.getElementById('rate');if(a)a.value='';if(b)b.value='';}
function recTotalMes(recs,tipo,k){return (recs||[]).filter(r=>r['Tipo']===tipo&&r['Ativo']!==false&&String(r['Ativo'])!=='false'&&(!r.createdAt||ym(r.createdAt)<=k)).reduce((s,r)=>s+num(r['Valor']),0);}
function num(v){if(typeof v==='number')return v;if(!v)return 0;const n=parseFloat(String(v).replace(/[^\d.,-]/g,'').replace(/\.(?=\d{3})/g,'').replace(',','.'));return isNaN(n)?0:n;}
function isThisMonth(d){if(!d)return false;const dt=new Date(d),n=new Date();return dt.getFullYear()===n.getFullYear()&&dt.getMonth()===n.getMonth();}
function today(){return new Date().toISOString().slice(0,10);}
function fmtBR(s){if(!s)return'';const p=String(s).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s;}
function ym(s){return String(s||'').slice(0,7);}
function addMonthsISO(iso,k){const d=new Date(iso+'T00:00:00');d.setMonth(d.getMonth()+k);return d.toISOString().slice(0,10);}
function monthsBetween(a,b){const x=new Date(a+'T00:00:00'),y=new Date(b+'T00:00:00');return (y.getFullYear()-x.getFullYear())*12+(y.getMonth()-x.getMonth());}
function cfg(){if(!LS.token){showLogin();return false;}return true;}
function destroyCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];}
function selOpts(arr,field,sel){return '<option value=""></option>'+arr.map(r=>{const v=(r[field]||'').toString();return `<option ${v===sel?'selected':''}>${v}</option>`}).join('');}
function seg(items,active,pick,mini){const d=document.createElement('div');d.className='seg'+(mini?' mini':'');items.forEach(([id,lb])=>{const b=document.createElement('button');b.textContent=lb;if(id===active)b.className='on';b.onclick=()=>{d.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');pick(id);};d.appendChild(b);});return d;}
function val(id){return document.getElementById(id).value;}
function closeModal(){document.getElementById('modal').innerHTML='';}
function animateCounts(){document.querySelectorAll('.cv').forEach(el=>{const t=parseFloat(el.dataset.v||'0'),t0=performance.now();(function s(n){const k=Math.min(1,(n-t0)/650),e=1-Math.pow(1-k,3);el.textContent=BRL(t*e);if(k<1)requestAnimationFrame(s);})(t0);});}
function faturaCiclo(dateISO,closing){const d=new Date(String(dateISO).slice(0,10)+'T00:00:00');let y=d.getFullYear(),m=d.getMonth();if(d.getDate()>(closing||31)){m++;if(m>11){m=0;y++;}}return `${y}-${String(m+1).padStart(2,'0')}`;}
function cicloLabel(x){const a=String(x).split('-');return new Date(+a[0],+a[1]-1,1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});}
function parcelasNoCiclo(parc,nome,ciclo){return (parc||[]).filter(p=>(p['Cartão']||'')===nome).reduce((s,p)=>{const N=Math.max(1,parseInt(num(p['Nº de parcelas']))||1),d1=String(p['Data da 1ª parcela']||today()).slice(0,10),vp=num(p['Valor da parcela'])||Math.round(num(p['Valor total'])/N*100)/100;let t=0;for(let k=0;k<N;k++)if(ym(addMonthsISO(d1,k))===ciclo)t+=vp;return s+t;},0);}
function parcelasCicloTotal(parc,ciclo){return (parc||[]).reduce((s,p)=>{const N=Math.max(1,parseInt(num(p['Nº de parcelas']))||1),d1=String(p['Data da 1ª parcela']||today()).slice(0,10),vp=num(p['Valor da parcela'])||Math.round(num(p['Valor total'])/N*100)/100;let t=0;for(let k=0;k<N;k++)if(ym(addMonthsISO(d1,k))===ciclo)t+=vp;return s+t;},0);}
function faturaTotal(lanc,parc,nome,closing,ciclo){let t=parcelasNoCiclo(parc,nome,ciclo);(lanc||[]).filter(l=>(l['Cartão']||'')===nome&&l['Tipo']==='Saída'&&(l['Origem']||'')!=='Fatura'&&faturaCiclo(l['Data'],closing)===ciclo).forEach(l=>t+=num(l['Valor']));return Math.round(t*100)/100;}
const SERIES={
  sVar:{label:'Saídas Var.',color:'#fb7185',f:r=>r['Tipo']==='Saída'&&r['Natureza']==='Variada'},
  sFix:{label:'Saídas Fixas',color:'#fbbf24',f:r=>r['Tipo']==='Saída'&&r['Natureza']==='Fixa'},
  sPar:{label:'Parcelados',color:'#a78bfa',f:r=>r['Tipo']==='Saída'&&r['Natureza']==='Parcelada'},
  eVar:{label:'Entradas Var.',color:'#34d399',f:r=>r['Tipo']==='Entrada'&&r['Natureza']==='Variada'},
  eFix:{label:'Ganhos Fixos',color:'#22d3ee',f:r=>r['Tipo']==='Entrada'&&r['Natureza']==='Fixa'},
};
const TABS=[
 {id:'home',t:'Início',i:'M3 11l9-8 9 8M5 9v11h5v-6h4v6h5V9'},
 {id:'add',t:'Lançar',i:'M12 5v14M5 12h14'},
 {id:'gerir',t:'Gerir',i:'M3 7h18v10H3zM3 11h18'},
 {id:'hist',t:'Histórico',i:'M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01'},
 {id:'timer',t:'Tempo',i:'M12 7v5l3 2M12 3a9 9 0 100 18 9 9 0 000-18z'},
 {id:'config',t:'Config',i:'M12 15a3 3 0 100-6 3 3 0 000 6zM19.4 13a7.8 7.8 0 000-2l2-1.5-2-3.5-2.3 1a7.6 7.6 0 00-1.7-1L14.5 3h-5l-.2 2.5a7.6 7.6 0 00-1.7 1l-2.3-1-2 3.5L3 11a7.8 7.8 0 000 2l-2 1.5 2 3.5 2.3-1a7.6 7.6 0 001.7 1l.2 2.5h5l.2-2.5a7.6 7.6 0 001.7-1l2.3 1 2-3.5z'},
];
let current='home';
const nav=document.getElementById('nav');
nav.innerHTML=TABS.map(x=>`<button data-tab="${x.id}"><svg viewBox="0 0 24 24"><path d="${x.i}"/></svg>${x.t}</button>`).join('');
nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=b.dataset.tab;syncNav();render();});
function syncNav(){nav.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.tab===current));}
function setBrand(){const el=document.getElementById('brandtxt');if(!el)return;const u=(LS.user||'').trim().split(/\s+/)[0];el.textContent=u?('Dash '+u.charAt(0).toUpperCase()+u.slice(1)):'Dash Lala';}
function render(){setBrand();document.getElementById('monthLabel').textContent=new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'});destroyCharts();
  ({home:viewHome,add:viewLancar,gerir:viewGerir,hist:viewHist,timer:viewTimer,config:viewConfig}[current])();}

let chartPeriod=6,chartFilter='all',chartOffset=0,LANC=[],PARC=[],REC=[];
async function viewHome(){
  if(!cfg())return;
  app.innerHTML='<div class="skel"></div><div class="grid"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>';
  try{
    const [lanc,contas,parc,recs]=await Promise.all([list('Lançamentos'),list('Contas'),list('Compras Parceladas'),list('Recorrências')]);LANC=lanc;PARC=parc;REC=recs;
    const sum=f=>lanc.filter(f).reduce((s,r)=>s+num(r['Valor']),0);
    const mes=r=>isThisMonth(r['Data']),conf=r=>(r['Status']||'')==='Confirmado',semCartao=r=>!(r['Cartão']&&String(r['Cartão']).trim());
    const mesK=ym(today());
    const recE=recTotalMes(recs,'Entrada',mesK),recS=recTotalMes(recs,'Saída',mesK);
    const sV=sum(r=>mes(r)&&SERIES.sVar.f(r)),sF=recS,sP=parcelasCicloTotal(parc,mesK),sT=sV+sF+sP;
    const eV=sum(r=>mes(r)&&SERIES.eVar.f(r)),eF=recE,eTot=eV+eF,saldoMes=eTot-sT;
    const acum=sum(r=>r['Tipo']==='Entrada'&&conf(r))-sum(r=>r['Tipo']==='Saída'&&conf(r)&&semCartao(r));
    const atual=contas.reduce((s,c)=>s+num(c['Saldo inicial']),0)+acum;
    const C=(l,v,cls,fkey)=>`<div class="card clk ${chartFilter===fkey?'on':''}" data-f="${fkey}"><div class="lbl">${l}</div><div class="val ${cls||''} cv" data-v="${v}">${BRL(0)}</div></div>`;
    app.innerHTML=`
      <div class="hero"><div class="lbl">Saldo atual</div><div class="v ${atual>=0?'green':'red'} cv" data-v="${atual}">${BRL(0)}</div>
        <div class="muted" style="margin-top:6px">Mês: <b class="${saldoMes>=0?'':''}" style="color:${saldoMes>=0?'#34d399':'#fb7185'}">${BRL(saldoMes)}</b> &nbsp;·&nbsp; Acumulado: <b style="color:${acum>=0?'#34d399':'#fb7185'}">${BRL(acum)}</b></div></div>
      <h2>Saídas do mês</h2>
      <div class="grid">${C('Variadas',sV,'red','sVar')}${C('Fixas',sF,'red','sFix')}${C('Parceladas',sP,'red','sPar')}<div class="card"><div class="lbl">Total saídas</div><div class="val red cv" data-v="${sT}">${BRL(0)}</div></div></div>
      <h2>Entradas do mês</h2>
      <div class="grid">${C('Variadas',eV,'green','eVar')}${C('Ganhos fixos',eF,'green','eFix')}<div class="card clk ${chartFilter==='acum'?'on':''}" data-f="acum"><div class="lbl">Saldo acumulado</div><div class="val ${acum>=0?'green':'red'} cv" data-v="${acum}">${BRL(0)}</div></div></div>
      <h2>Gráfico</h2>
      <div class="panel"><div class="ph"><div id="segp"></div><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><button class="sm ghost" id="navp">‹</button><span class="muted" id="rangelbl" style="min-width:140px;text-align:center;font-size:12px"></span><button class="sm ghost" id="navn">›</button><button class="sm ghost" id="hoje">hoje</button><button class="ghost sm" id="geral">Ver tudo</button></div></div><div class="ph" style="margin-top:2px"><div class="muted" style="display:flex;align-items:center;gap:6px;font-size:12px">De <input type="month" id="rde" style="width:auto;margin:0;padding:6px 8px"> até <input type="month" id="rate" style="width:auto;margin:0;padding:6px 8px"></div></div><canvas id="mainChart" height="110"></canvas></div>`;
    animateCounts();
    document.getElementById('segp').appendChild(seg([['3',' 3M'],['6','6M'],['12','12M'],['24','24M']],String(chartPeriod),v=>{chartPeriod=+v;clearRange();drawMainChart();},true));
    document.getElementById('geral').onclick=()=>{chartFilter='all';document.querySelectorAll('.clk').forEach(c=>c.classList.remove('on'));drawMainChart();};
    document.getElementById('navp').onclick=()=>{clearRange();chartOffset-=Math.max(1,Math.floor(chartPeriod/2));drawMainChart();};
    document.getElementById('navn').onclick=()=>{clearRange();chartOffset+=Math.max(1,Math.floor(chartPeriod/2));drawMainChart();};
    document.getElementById('hoje').onclick=()=>{clearRange();chartOffset=0;drawMainChart();};
    const rde=document.getElementById('rde'),rate=document.getElementById('rate');if(rde)rde.onchange=()=>drawMainChart();if(rate)rate.onchange=()=>drawMainChart();
    app.querySelectorAll('.clk').forEach(c=>c.onclick=()=>{chartFilter=c.dataset.f;app.querySelectorAll('.clk').forEach(x=>x.classList.toggle('on',x===c));drawMainChart();});

function drawMainChart(){
  destroyCharts();const ctx=document.getElementById('mainChart');if(!ctx||typeof Chart==='undefined')return;
  Chart.defaults.color='#8a93ab';
  const K=chartPeriod,now=new Date(),months=[];
  const de=(document.getElementById('rde')||{}).value,ate=(document.getElementById('rate')||{}).value;
  if(de&&ate&&de<=ate){let y=+de.split('-')[0],m=+de.split('-')[1];for(let g=0;g<120;g++){const k=`${y}-${String(m).padStart(2,'0')}`;months.push({k,lb:new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})});if(k===ate)break;m++;if(m>12){m=1;y++;}}}
  else{const past=Math.floor(K/2);for(let i=-past;i<K-past;i++){const d=new Date(now.getFullYear(),now.getMonth()+i+chartOffset,1);months.push({k:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,lb:d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})});}}
  const rl=document.getElementById('rangelbl');if(rl)rl.textContent=months[0].lb+' — '+months[months.length-1].lb;
  const inM=(r,k)=>ym(r['Data'])===k;
  if(chartFilter==='acum'){
    let run=0;const data=months.map(m=>{const e=LANC.filter(r=>inM(r,m.k)&&r['Tipo']==='Entrada'&&(r['Status']||'')==='Confirmado').reduce((s,r)=>s+num(r['Valor']),0);
      const s=LANC.filter(r=>inM(r,m.k)&&r['Tipo']==='Saída'&&(r['Status']||'')==='Confirmado'&&!(r['Cartão']&&String(r['Cartão']).trim())).reduce((a,r)=>a+num(r['Valor']),0);run+=e-s;return Math.round(run*100)/100;});
    charts.push(new Chart(ctx,{type:'line',data:{labels:months.map(m=>m.lb),datasets:[{label:'Saldo acumulado',data,borderColor:'#7c6cff',backgroundColor:'rgba(124,108,255,.15)',fill:true,tension:.3,pointRadius:3}]},options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(255,255,255,.06)'}},x:{grid:{display:false}}}}}));
    return;
  }
  const keys=chartFilter==='all'?Object.keys(SERIES):[chartFilter];
  const sval=(key,k)=>key==='sPar'?parcelasCicloTotal(PARC,k):key==='sFix'?recTotalMes(REC,'Saída',k):key==='eFix'?recTotalMes(REC,'Entrada',k):LANC.filter(r=>inM(r,k)&&SERIES[key].f(r)).reduce((s,r)=>s+num(r['Valor']),0);
  const curK=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const datasets=keys.map(key=>({label:SERIES[key].label,backgroundColor:months.map(m=>SERIES[key].color+(m.k>curK?'4d':'')),borderRadius:6,data:months.map(m=>Math.round(sval(key,m.k)*100)/100)}));
  charts.push(new Chart(ctx,{type:'bar',data:{labels:months.map(m=>m.lb),datasets},options:{plugins:{legend:{display:keys.length>1,position:'bottom',labels:{boxWidth:12,padding:10}}},scales:{y:{grid:{color:'rgba(255,255,255,.06)'}},x:{grid:{display:false}}}}}));
}

async function gContas(sub){
  const [contas,carts,lanc,parc,faturas]=await Promise.all([list('Contas'),list('Cartões'),list('Lançamentos'),list('Compras Parceladas'),list('Faturas')]);
  const saldo=nome=>{let s=num((contas.find(a=>a['Nome']===nome)||{})['Saldo inicial']);lanc.forEach(l=>{if((l['Conta']||'')===nome&&(l['Status']||'')==='Confirmado')s+=(l['Tipo']==='Entrada'?1:-1)*num(l['Valor']);});return Math.round(s*100)/100;};
  const paga=(nome,ciclo)=>faturas.some(f=>(f['Cartão']||'')===nome&&(f['Ciclo']||'')===ciclo&&(f['Status']||'')==='Paga');
  const cc=(c,gi)=>{const i=carts.indexOf(c),lim=num(c['Limite']),clo=parseInt(num(c['Dia de fechamento']))||31,ciclo=faturaCiclo(today(),clo),tot=faturaTotal(lanc,parc,c['Nome'],clo,ciclo),pct=lim?Math.min(100,Math.round(tot/lim*100)):0,pg=paga(c['Nome'],ciclo);
    return `<div class="cc"><div class="cc-band" style="background:${CCOL[gi%CCOL.length]}"><span>${c['Nome']||'—'}</span><span class="cc-chip"></span></div><div class="cc-body">
      <div class="muted" style="font-size:12px">Fatura ${cicloLabel(ciclo)} ${pg?'· paga':''}</div><div class="${pg?'green':''}" style="font-weight:800">${BRL(tot)} <span class="muted" style="font-weight:400;font-size:12px">/ ${BRL(lim)}</span></div>
      <div class="bar"><i class="${pct>80?'hot':''}" style="width:${pct}%"></i></div>
      <div class="muted" style="font-size:11px;margin-top:6px">fecha dia ${clo} · vence dia ${c['Dia de vencimento']||'?'}</div>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:center">${pg?'<span class="pill">paga</span>':`<button class="sm green" data-pay="${i}">Pagar fatura</button>`}<button class="sm ghost" data-ver="${i}">Faturas</button><button class="delx" data-delcard="${i}" title="Remover">🗑</button></div></div></div>`;};
  let html=`<div class="ph"><b>Contas</b><button class="sm" id="addc">+ Adicionar conta</button></div>`;
  if(!contas.length)html+='<p class="muted">Nenhuma conta. Toque em Adicionar conta.</p>';

    html+=`<div class="panel" style="margin-bottom:14px"><div class="ph"><div><b>${a['Nome']}</b> <span class="pill">${a['Tipo']||''}</span><div class="val ${saldo(a['Nome'])>=0?'green':'red'}" style="font-size:20px">${BRL(saldo(a['Nome']))}</div></div><div><button class="sm ghost" data-addcard="${gi}">+ Cartão</button> <button class="delx" data-delconta="${gi}" title="Remover">🗑</button></div></div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(230px,1fr))">${cs.length?cs.map(c=>cc(c,gi)).join(''):'<p class="muted" style="font-size:13px">Sem cartões nesta conta.</p>'}</div></div>`;});
  const sem=carts.filter(c=>!(c['Conta']&&String(c['Conta']).trim()));
  if(sem.length)html+=`<div class="panel"><b class="muted">Cartões sem conta</b><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(230px,1fr));margin-top:10px">${sem.map(c=>cc(c,4)).join('')}</div></div>`;

    return `<div class="card"><div class="clk" data-h="${i}" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><b>${r['Nome']||'—'}</b><span class="pill">dia ${r['Dia do mês']||'?'}</span></div>
    <div class="val ${ent?'green':'red'}" style="font-size:20px;margin-top:6px">${BRL(num(r['Valor']))}</div><div class="muted" style="font-size:12px">${r['Tipo']} · ${r['Categoria']||''}</div></div>
    <div style="margin-top:10px;display:flex;gap:8px;align-items:center">${p?'<span class="pill">'+(ent?'recebido este mês':'pago este mês')+'</span>':`<button class="sm ${ent?'green':'amber'}" data-i="${i}">${ent?'Receber':'Pagar'}</button>`}<button class="delx" data-del="${i}" title="Remover">🗑</button></div></div>`}).join(''):'<p class="muted">Nenhum fixo. Cadastre em Lançar › Fixo.</p>'}</div>`;
  sub.querySelectorAll('button[data-i]').forEach(b=>b.onclick=async()=>{const r=recs[+b.dataset.i];b.textContent='…';
    const now=new Date(),dd=String(Math.min(parseInt(r['Dia do mês']||'1')||1,28)).padStart(2,'0'),data=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${dd}`;
    try{await addRow('Lançamentos',{'Data':data,'Descrição':r['Nome'],'Valor':num(r['Valor']),'Tipo':r['Tipo'],'Natureza':'Fixa','Categoria':r['Categoria']||'','Status':'Confirmado','Origem':'Recorrência'});await gFixos(sub);}catch(e){b.textContent='erro';}});
  sub.querySelectorAll('button[data-del]').forEach(b=>b.onclick=async()=>{const r=recs[+b.dataset.del];if(!confirm('Remover o fixo '+r['Nome']+'?'))return;try{await delRow('Recorrências',r.id);gFixos(sub);}catch(e){alert(e.message);}});
  sub.querySelectorAll('.clk[data-h]').forEach(el=>el.onclick=()=>{const r=recs[+el.dataset.h];
    const hist=lanc.filter(l=>(l['Origem']||'')==='Recorrência'&&(l['Descrição']||'')===r['Nome']).sort((a,b)=>String(b['Data']).localeCompare(String(a['Data']))).slice(0,12);
    openModal(`<div class="ph"><b>${r['Nome']} — últimos pagamentos</b><button class="ghost sm" onclick="closeModal()">Fechar</button></div>${hist.length?hist.map(l=>`<div class="item"><div>${fmtBR(l['Data'])}</div><div class="val ${r['Tipo']==='Entrada'?'green':'red'}" style="font-size:15px">${BRL(num(l['Valor']))}</div></div>`).join(''):'<p class="muted">Nenhum pagamento registrado ainda.</p>'}`);});
}
async function gParcelados(sub){
  const parc=await list('Compras Parceladas');
  if(!parc.length){sub.innerHTML='<p class="muted">Nenhuma compra parcelada. Cadastre em Lançar › Parcelado.</p>';return;}
  const hoje=today();
  sub.innerHTML='<p class="muted" style="margin:0 4px 12px">As parcelas entram automaticamente na fatura do cartão no mês de cada vencimento.</p><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr))">'+parc.map((p,pi)=>{
    const desc=p['Descrição']||'—',N=Math.max(1,parseInt(num(p['Nº de parcelas']))||1),total=num(p['Valor total']),d1=String(p['Data da 1ª parcela']||hoje).slice(0,10),vp=num(p['Valor da parcela'])||Math.round(total/N*100)/100;
    const atual=Math.min(N,Math.max(1,monthsBetween(d1,hoje)+1)),dia=d1.slice(8,10),pct=Math.round(atual/N*100);
    let linhas='';for(let k=1;k<=N;k++){const data=addMonthsISO(d1,k-1),eh=k===atual,passou=data<hoje;
      linhas+=`<div class="item" style="${eh?'border-color:var(--accent)':''}"><div>${k}${eh?' <span class="pill">ATUAL</span>':''} &nbsp;<small>${fmtBR(data)}</small></div><span class="val ${passou?'green':''}" style="font-size:15px">${BRL(vp)}</span></div>`;}
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><b>${desc}</b><div style="display:flex;align-items:center;gap:8px"><span class="pill">Parcela ${atual}/${N}</span><button class="delx" data-del="${pi}" title="Remover">🗑</button></div></div>
      <div class="bar" style="margin:10px 0"><i style="width:${pct}%"></i></div>
      <div class="row"><div><small class="muted">POR PARCELA</small><div class="val accent" style="font-size:18px">${BRL(vp)}</div></div><div><small class="muted">VENC.</small><div style="font-weight:700">dia ${dia}</div></div><div><small class="muted">TOTAL</small><div style="font-weight:700">${BRL(total)}</div></div></div>
      <details style="margin-top:10px"><summary class="muted" style="cursor:pointer">${N} parcelas</summary><div style="margin-top:8px">${linhas}</div></details>${p['Cartão']?`<div class="muted" style="font-size:12px;margin-top:8px">no cartão ${p['Cartão']}</div>`:''}</div>`;
  }).join('')+'</div>';
  sub.querySelectorAll('button[data-del]').forEach(b=>b.onclick=async()=>{const p=parc[+b.dataset.del];if(!confirm('Remover a compra '+p['Descrição']+'?'))return;try{await delRow('Compras Parceladas',p.id);gParcelados(sub);}catch(e){alert(e.message);}});
}
let histF='todas';
async function viewHist(){
  if(!cfg())return;
  app.innerHTML='<div id="sb"></div><div id="sub"><div class="skel"></div></div>';
  const F={todas:()=>true,entradas:r=>r['Tipo']==='Entrada',saidas:r=>r['Tipo']==='Saída',fixos:r=>r['Natureza']==='Fixa',parcelados:r=>r['Natureza']==='Parcelada',variadas:r=>r['Natureza']==='Variada'};
  document.getElementById('sb').appendChild(seg([['todas','Todas'],['entradas','Entradas'],['saidas','Saídas'],['fixos','Fixos'],['parcelados','Parcelados'],['variadas','Variadas']],histF,v=>{histF=v;viewHist();},true));
  const sub=document.getElementById('sub');
  try{
    const lanc=(await list('Lançamentos')).filter(F[histF]).sort((a,b)=>String(b['Data']).localeCompare(String(a['Data'])));
    const tot=lanc.reduce((s,r)=>s+(r['Tipo']==='Entrada'?1:-1)*num(r['Valor']),0);
    sub.innerHTML=`<div class="item" style="background:rgba(255,255,255,.02)"><div><b>${lanc.length} lançamentos</b></div><div class="val ${tot>=0?'green':'red'}">${BRL(tot)}</div></div>`+
      (lanc.length?lanc.slice(0,200).map(r=>`<div class="item"><div>${r['Descrição']||'—'}<br><small>${fmtBR(r['Data'])} · ${r['Natureza']||''} ${r['Categoria']?'· '+r['Categoria']:''}</small></div><div class="val ${r['Tipo']==='Entrada'?'green':'red'}">${r['Tipo']==='Entrada'?'+':'−'} ${BRL(num(r['Valor']))}</div><button class="delx" data-del="${r.id}" title="Remover">🗑</button></div>`).join(''):'<p class="muted">Nada por aqui.</p>');
    sub.querySelectorAll('button[data-del]').forEach(b=>b.onclick=async()=>{if(!confirm('Remover lançamento?'))return;try{await delRow('Lançamentos',b.dataset.del);viewHist();}catch(e){alert(e.message);}});
  }catch(e){sub.innerHTML=`<p class="err">${e.message}</p>`;}
}

let tick=null;
function viewTimer(){
  if(!cfg())return;
  const ghUrl='https://github.com/Oikky/dashlala';
  app.innerHTML=`<h2>Cronômetro</h2>
    <div class="panel" style="text-align:center">
      <p class="muted">Valor/hora: <b style="color:#b9b3ff">${BRL(LS.vh)}</b></p>
      <div style="font-size:46px;font-weight:800;letter-spacing:2px;margin:10px 0" id="clock">00:00:00</div>
      <div id="tbtn"></div><div id="msg"></div>
    </div>
    <h2>Sessões recentes</h2><div id="ses"><div class="skel"></div></div>
    <h2>Widget do PC</h2><div class="panel"><p class="muted">Atalhos globais (Ctrl+Alt+I iniciar · P pausar/voltar · R registrar · V mostrar) com um widget no canto da tela.</p>
      <a href="${ghUrl}/raw/main/cronometro.ahk" download><button class="ghost">Baixar cronometro.ahk</button></a>
      <a href="${ghUrl}/raw/main/instalar-cronometro.bat" download><button class="ghost">Baixar instalador</button></a></div>`;
  const K={a:'dl_active',s:'dl_seg',c:'dl_acum'},g=k=>localStorage.getItem(k);
  function worked(){if(!g(K.a))return 0;let a=parseFloat(g(K.c)||'0');if(g(K.s))a+=(Date.now()-Number(g(K.s)))/1000;return a;}
  function paint(){const active=!!g(K.a),running=!!g(K.s);
    document.getElementById('tbtn').innerHTML=!active
      ?'<button class="green" id="start">Iniciar</button>'
      :`<div class="row"><button class="amber" id="pause">${running?'Pausar':'Voltar'}</button><button style="background:linear-gradient(135deg,#fb7185,#f43f5e)" id="reg">Registrar</button></div>`;
    const s=document.getElementById('start');if(s)s.onclick=()=>{localStorage.setItem(K.a,'1');localStorage.setItem(K.c,'0');localStorage.setItem(K.s,String(Date.now()));paint();};
    const p=document.getElementById('pause');if(p)p.onclick=()=>{if(g(K.s)){localStorage.setItem(K.c,String(parseFloat(g(K.c)||'0')+(Date.now()-Number(g(K.s)))/1000));localStorage.removeItem(K.s);}else localStorage.setItem(K.s,String(Date.now()));paint();};
    const r=document.getElementById('reg');if(r)r.onclick=reg;}
  function upd(){const c=document.getElementById('clock');if(!c)return;const s=Math.floor(worked());c.textContent=[s/3600,s%3600/60,s%60].map(x=>String(Math.floor(x)).padStart(2,'0')).join(':');}
  async function reg(){const m=document.getElementById('msg');const secs=worked();if(secs<1){m.innerHTML='<p class="err">Tempo muito curto.</p>';return;}
    const horas=Math.round(secs/3600*100)/100,valor=+(horas*LS.vh).toFixed(2),fim=new Date(),ini=new Date(Date.now()-secs*1000);
    try{m.textContent='Salvando…';await addRow('Sessões de Trabalho',{'Início':ini.toISOString(),'Fim':fim.toISOString(),'Duração (h)':horas,'Valor/hora':LS.vh});
      if(valor>0)await addRow('Lançamentos',{'Data':today(),'Descrição':'Trabalho ('+horas+'h)','Valor':valor,'Tipo':'Entrada','Natureza':'Variada','Status':'Confirmado','Origem':'Cronômetro'});
      localStorage.removeItem(K.a);localStorage.removeItem(K.s);localStorage.removeItem(K.c);m.innerHTML=`<p class="ok">✅ ${horas}h · ${BRL(valor)}</p>`;paint();loadSes();}catch(e){m.innerHTML=`<p class="err">${e.message}</p>`;}}
  async function loadSes(){const el=document.getElementById('ses');try{const ses=(await list('Sessões de Trabalho')).slice(-10).reverse();
    el.innerHTML=ses.length?ses.map(s=>`<div class="item"><div>${fmtBR(s['Início'])}<br><small>${num(s['Duração (h)']).toFixed(2)}h</small></div><div class="val green">${BRL(num(s['Duração (h)'])*num(s['Valor/hora']))}</div></div>`).join(''):'<p class="muted">Nenhuma sessão ainda.</p>';}catch(e){el.innerHTML=`<p class="err">${e.message}</p>`;}}
  paint();upd();clearInterval(tick);tick=setInterval(upd,1000);loadSes();
}

function showLogin(){
  const nav=document.getElementById('nav');if(nav)nav.style.display='none';
  const bt=document.getElementById('brandtxt');if(bt)bt.textContent='Dash';
  const ml=document.getElementById('monthLabel');if(ml)ml.textContent='';
  app.innerHTML=`<div style="max-width:390px;margin:7vh auto 0"><div class="hero" style="text-align:center"><div class="lbl">Bem-vindo</div><div class="v" style="font-size:30px">Dash</div></div>
    <div class="panel" style="margin-top:16px"><label>Usuário</label><input id="lu" autocomplete="username"><label>Senha</label><input id="lp" type="password" autocomplete="current-password">
    <button id="lbtn">Entrar</button><div id="lm"></div></div>
    <div class="panel" style="margin-top:12px"><button class="ghost" id="atog">Primeiro acesso / criar usuário</button><div id="abox" style="display:none">
      <p class="muted" style="font-size:12px">Precisa da chave de admin do Worker. Cria/atualiza um usuário e vincula o doc dele.</p>
      <label>Chave de admin</label><input id="ak" type="password"><label>Novo usuário</label><input id="nu"><label>Senha</label><input id="np" type="password"><label>DocId</label><input id="nd" placeholder="ex: QfJPjC9o8G">
      <button id="cu">Criar usuário</button><div id="am"></div></div></div></div>`;
  const go=async()=>{const m=document.getElementById('lm'),u=val('lu'),s=val('lp');if(!u||!s){m.innerHTML='<p class="err">Preencha usuário e senha.</p>';return;}
    try{m.textContent='Entrando…';const r=await fetch(LS.url.replace(/\/$/,'')+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:u,senha:s})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Falha no login');LS.token=d.token;LS.user=d.usuario||u;const nv=document.getElementById('nav');if(nv)nv.style.display='';current='home';syncNav();render();}catch(e){m.innerHTML=`<p class="err">${e.message}</p>`;}};
  document.getElementById('lbtn').onclick=go;
  document.getElementById('lp').onkeydown=e=>{if(e.key==='Enter')go();};
  document.getElementById('atog').onclick=()=>{const a=document.getElementById('abox');a.style.display=a.style.display==='none'?'block':'none';};
  document.getElementById('cu').onclick=async()=>{const m=document.getElementById('am'),ak=val('ak'),u=val('nu'),s=val('np'),d=val('nd');if(!ak||!u||!s||!d){m.innerHTML='<p class="err">Preencha tudo.</p>';return;}
    try{m.textContent='Criando…';const r=await fetch(LS.url.replace(/\/$/,'')+'/admin/setuser',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':ak},body:JSON.stringify({usuario:u,senha:s,docId:d})});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||'Erro');m.innerHTML='<p class="ok">Usuário criado! Agora é só entrar acima.</p>';document.getElementById('lu').value=u;document.getElementById('lp').value=s;}catch(e){m.innerHTML=`<p class="err">${e.message}</p>`;}};
}
async function viewConfig(){
  app.innerHTML=`<h2>Preferências</h2>
    <div class="panel"><label>Valor por hora (R$)</label><input id="c_vh" type="number" step="0.01" value="${LS.vh||''}"><button id="svh">Salvar valor/hora</button><div id="m1"></div></div>
    <h2>Categorias</h2><div class="panel" id="catbox"><div class="skel"></div></div>
    <h2>Conta</h2><div class="panel"><button class="ghost" id="logout">Sair desta conta</button></div>
    <h2>Admin · criar usuário</h2><div class="panel"><button class="ghost" id="toggle">Mostrar</button><div id="adv" style="display:none">
      <p class="muted" style="font-size:12px">Só para o administrador. Cria/atualiza um usuário e vincula o doc dele.</p>
      <label>Chave de admin</label><input id="ak" type="password"><label>Usuário</label><input id="nu"><label>Senha</label><input id="np" type="password"><label>DocId do usuário</label><input id="nd" placeholder="ex: QfJPjC9o8G">
      <button id="cu">Criar / atualizar</button><div id="m2"></div>
      <label style="margin-top:14px">URL do Worker (avançado)</label><input id="c_url" value="${LS.url}"><button class="ghost" id="csave">Salvar URL</button></div></div>`;
  document.getElementById('svh').onclick=()=>{LS.vh=parseFloat(val('c_vh')||'0')||0;document.getElementById('m1').innerHTML='<p class="ok">Salvo.</p>';};
  document.getElementById('logout').onclick=()=>{LS.token='';LS.user='';showLogin();};
  document.getElementById('toggle').onclick=()=>{const a=document.getElementById('adv');a.style.display=a.style.display==='none'?'block':'none';};
  document.getElementById('csave').onclick=()=>{LS.url=val('c_url').trim();document.getElementById('m2').innerHTML='<p class="ok">URL salva.</p>';};
  document.getElementById('cu').onclick=async()=>{const m=document.getElementById('m2');const ak=val('ak'),u=val('nu'),s=val('np'),d=val('nd');if(!ak||!u||!s||!d){m.innerHTML='<p class="err">Preencha tudo.</p>';return;}
    try{m.textContent='Salvando…';const r=await fetch(LS.url.replace(/\/$/,'')+'/admin/setuser',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':ak},body:JSON.stringify({usuario:u,senha:s,docId:d})});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||'Erro');m.innerHTML='<p class="ok">Usuário salvo!</p>';}catch(e){m.innerHTML=`<p class="err">${e.message}</p>`;}};
  if(LS.token)loadCats();
  async function loadCats(){const box=document.getElementById('catbox');try{const cats=await list('Categorias');
    box.innerHTML=`<label>Nova categoria</label><input id="cn" placeholder="ex: Mercado"><label>Tipo</label><select id="ct"><option>Saída</option><option>Entrada</option></select><button id="cadd">Adicionar</button><div id="m3"></div>
      <div style="margin-top:12px">${cats.length?cats.map(c=>`<div class="item"><div>${c['Nome']||'—'}</div><div style="display:flex;align-items:center;gap:8px"><span class="pill">${c['Tipo']||''}</span><button class="delx" data-del="${c.id}" title="Remover">🗑</button></div></div>`).join(''):'<p class="muted">Nenhuma categoria.</p>'}</div>`;
    document.getElementById('cadd').onclick=async()=>{const m=document.getElementById('m3'),n=val('cn');if(!n){m.innerHTML='<p class="err">Informe o nome.</p>';return;}
      try{m.textContent='Salvando…';await addRow('Categorias',{'Nome':n,'Tipo':val('ct')});loadCats();}catch(e){m.innerHTML=`<p class="err">${e.message}</p>`;}};
    box.querySelectorAll('button[data-del]').forEach(b=>b.onclick=async()=>{if(!confirm('Remover categoria?'))return;try{await delRow('Categorias',b.dataset.del);loadCats();}catch(e){alert(e.message);}});
  }catch(e){box.innerHTML=`<p class="err">${e.message}</p>`;}}
}
if(LS.token){syncNav();render();}else{showLogin();}
</script></script>
